# Redis configuration file

# Network
bind 0.0.0.0
port 6379

# Security
requirepass ""  # Set a password in production
protected-mode yes

# Persistence
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# Memory Management
maxmemory 256mb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# Performance
tcp-keepalive 300
timeout 0

# Logging
loglevel notice
logfile ""

# Advanced
activerehashing yes
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Keyspace events (for cache invalidation)
notify-keyspace-events "Ex"